<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>CI/CD pipeline</title>
<desc>Developer pushes to GitHub, triggering GitHub Actions, which authenticates to AWS via OIDC and builds/pushes Rails and Nginx images to ECR.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="320" fill="#ffffff"/>

<g><rect x="40" y="30" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text x="115" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Developer</text></g>
<line x1="190" y1="52" x2="216" y2="52" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<g><rect x="220" y="30" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/><text x="295" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">GitHub (main)</text></g>
<line x1="295" y1="74" x2="295" y2="96" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<g><rect x="180" y="100" width="230" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="295" y="124" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">GitHub Actions triggered</text><text x="295" y="142" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">on push to main</text></g>
<line x1="295" y1="156" x2="295" y2="178" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<g><rect x="180" y="182" width="230" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="295" y="206" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Authenticate via OIDC</text><text x="295" y="224" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">AWS role, no stored keys</text></g>
<line x1="295" y1="238" x2="185" y2="250" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="295" y1="238" x2="405" y2="250" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<g><rect x="60" y="254" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="180" y="278" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Build + push rails-app</text><text x="180" y="296" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">to Amazon ECR</text></g>
<g><rect x="380" y="254" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="500" y="278" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Build + push nginx</text><text x="500" y="296" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">to Amazon ECR</text></g>
</svg>
