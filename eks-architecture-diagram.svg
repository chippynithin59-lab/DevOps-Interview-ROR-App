<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Kubernetes / EKS architecture</title>
<desc>Internet to ALB in public subnet, through Ingress and Service to pods on EKS worker nodes in private subnets. Pods connect to RDS via credentials and S3 via IRSA. Images pulled from ECR.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="560" fill="#ffffff"/>

<text x="340" y="26" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">Internet</text>
<line x1="340" y1="34" x2="340" y2="46" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="50" width="560" height="70" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="80" y="70" font-family="sans-serif" font-size="12" fill="#0C447C">Public subnet</text>
<rect x="240" y="80" width="200" height="30" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="99" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">ALB</text>

<line x1="340" y1="120" x2="340" y2="132" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<g><rect x="220" y="136" width="240" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="340" y="162" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Ingress + Service</text></g>
<line x1="340" y1="180" x2="340" y2="192" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="196" width="560" height="180" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="80" y="216" font-family="sans-serif" font-size="12" fill="#085041">Private subnets, multi-AZ</text>

<g><rect x="80" y="230" width="240" height="120" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text x="200" y="254" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Worker node 1</text><text x="200" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Pod</text><text x="200" y="316" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Rails + Nginx</text></g>
<g><rect x="360" y="230" width="240" height="120" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text x="480" y="254" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Worker node 2</text><text x="480" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Pod</text><text x="480" y="316" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Rails + Nginx</text></g>
<text x="340" y="364" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#085041">HPA scales pods 2-6</text>

<line x1="200" y1="376" x2="200" y2="404" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="480" y1="376" x2="480" y2="404" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="200" y="396" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">DB creds</text>
<text x="480" y="396" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">IRSA, no keys</text>

<g><rect x="80" y="406" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text x="200" y="430" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">RDS Postgres</text><text x="200" y="448" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">Private subnet</text></g>
<g><rect x="360" y="406" width="240" height="56" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/><text x="480" y="430" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#72243E">S3 bucket</text><text x="480" y="448" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993556">Encrypted, private</text></g>

<line x1="200" y1="230" x2="100" y2="500" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.6"/>
<text x="150" y="518" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">image pull</text>
<rect x="40" y="524" width="150" height="28" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="115" y="542" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2C2C2A">Amazon ECR</text>
</svg>
